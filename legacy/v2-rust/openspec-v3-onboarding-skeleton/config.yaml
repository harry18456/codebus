schema: spec-driven

# Project context: codebus v3 fresh start (May 2026).
# See AGENTS.md (root) for development workflow and architectural intent.
# See docs/strategy/2026-05-08-skill-vs-binary-pivot.md §11.7 for v3 day-1
# architectural commitments (multi-vendor / MCP / skill-generator pre-wiring).
context: |
  codebus v3: agentic-CLI-agnostic codebase memory layer.
  - Day-1 architecture must support multiple agentic providers via AgenticProvider trait.
  - Schema split: AGENTS.md (neutral) + per-vendor adapter (CLAUDE.md / GEMINI.md / etc).
  - MCP server hook reserved (codebus mcp subcommand).
  - Locale: zh-tw for user communication, en-us for code/commits.
  - Reference: legacy/v2-rust/ for v2 rust-port plumbing patterns to consult (but not blindly carry).

# Per-artifact rules
rules:
  proposal:
    - State explicitly whether the change preserves v3 day-1 architectural commitments (AgenticProvider, schema split, MCP hook).
    - If carrying logic from legacy/v2-rust/, justify why direct port is appropriate vs reshaping for v3 abstractions.
  design:
    - For modules touching the AgenticProvider trait or schema split, include a section confirming no Claude-specific assumption leaks into the neutral interface.
