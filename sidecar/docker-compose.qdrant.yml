# Qdrant Docker Compose — FALLBACK path per docs/decisions.md D-027.
# The M1 primary path is the standalone binary launched via
# sidecar/scripts/start-qdrant.{sh,ps1}.  This compose file remains for
# environments that already have Docker (CI, Linux dev boxes preferring
# containers).  Sidecar connects via CODEBUS_QDRANT_URL — whichever path
# runs is transparent to the Python code.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: codebus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./kb:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 6
